name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  v2:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache-dependency-path: v2/go.sum
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./... -count=1
      - name: race
        run: go test ./... -count=1 -race
